name: Build Zeeshan Z+2 Chat (Turbo Master 2026)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: 4. Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/zeeshan/ai
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/cpp
          
          cat << 'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS); repositories { google(); mavenCentral() } }
          rootProject.name = "ZPlus2Chat"
          include ':app'
          EOF

          echo "android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx6g" > gradle.properties

      - name: 5. Download 750MB Qwen Dimaag (RAM Safe Edition)
        run: |
          # 2026 Live Link for Qwen 1.8B Q2_K (750MB)
          wget -q --show-progress https://huggingface.co/mradermacher/Qwen1.5-1.8B-Chat-GGUF/resolve/main/Qwen1.5-1.8B-Chat.Q2_K.gguf -O app/src/main/assets/z_model.gguf

      - name: 6. Setup Icon & Llama Engine (Verified Stable)
        run: |
          git clone --branch b3561 --depth 1 https://github.com/ggml-org/llama.cpp.git app/src/main/cpp/llama
          # Placeholder Icon (Bhai, apni logo image is folder me ic_z_logo.png naam se rakhna)
          wget -q --show-progress "https://cdn-icons-png.flaticon.com/512/9342/9342158.png" -O app/src/main/res/drawable/ic_z_logo.png

      - name: 7. Write C++ Engine (Thinking Loop & Accelerator)
        run: |
          cat << 'EOF' > app/src/main/cpp/CMakeLists.txt
          cmake_minimum_required(VERSION 3.22.1)
          project("z2_engine")
          add_subdirectory(llama)
          add_library(${CMAKE_PROJECT_NAME} SHARED native-lib.cpp)
          target_include_directories(${CMAKE_PROJECT_NAME} PRIVATE llama/include llama)
          target_link_libraries(${CMAKE_PROJECT_NAME} llama log)
          EOF

          cat << 'EOF' > app/src/main/cpp/native-lib.cpp
          #include <jni.h>
          #include <string>
          #include <vector>
          #include "llama.h"

          extern "C" JNIEXPORT jstring JNICALL
          Java_com_zeeshan_ai_MainActivity_askZNative(JNIEnv* env, jobject, jstring prompt, jstring modelPath) {
              const char *userText = env->GetStringUTFChars(prompt, 0);
              const char *path = env->GetStringUTFChars(modelPath, 0);
              
              llama_backend_init();
              auto mparams = llama_model_default_params();
              mparams.n_gpu_layers = 0; 
              llama_model * model = llama_load_model_from_file(path, mparams);
              
              if (!model) return env->NewStringUTF("Error: Engine Load Failed!");

              auto cparams = llama_context_default_params();
              // Zeeshan bhai ka Ultra-Lite 200 CTX (RAM Saver for 1.8GB)
              cparams.n_ctx = 200; 
              cparams.n_threads = 4;
              
              llama_context * ctx = llama_new_context_with_model(model, cparams);

              std::vector<llama_token> tokens(200);
              int n_tokens = llama_tokenize(model, userText, strlen(userText), tokens.data(), tokens.size(), true, true);
              
              llama_batch batch = llama_batch_get_one(tokens.data(), (n_tokens > 190 ? 190 : n_tokens), 0, 0);
              llama_decode(ctx, batch);

              std::string ai_reply = "";
              int n_vocab = llama_n_vocab(model);

              // 🚀 262-WORD THINKING LOOP ACCELERATOR 🚀
              for (int step = 0; step < 262; step++) {
                  float * logits = llama_get_logits_ith(ctx, batch.n_tokens - 1);
                  llama_token id = 0; float max_p = -1e9f;
                  for (int i = 0; i < n_vocab; i++) { if (logits[i] > max_p) { max_p = logits[i]; id = i; } }
                  if (llama_token_is_eog(model, id)) break; 
                  char buf[128];
                  int n = llama_token_to_piece(model, id, buf, sizeof(buf), 0, true);
                  if (n > 0) ai_reply += std::string(buf, n);
                  batch = llama_batch_get_one(&id, 1, n_tokens + step, 0);
                  if (llama_decode(ctx, batch) != 0) break;
              }

              llama_free(ctx);
              llama_free_model(model);
              llama_backend_free();
              env->ReleaseStringUTFChars(prompt, userText);
              env->ReleaseStringUTFChars(modelPath, path);
              return env->NewStringUTF(ai_reply.c_str());
          }
          EOF

      - name: 8. Write Java UI (Blue Theme & Custom Naming)
        run: |
          cat << 'EOF' > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.zeeshan.ai'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.zeeshan.ai'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "37.0-ZPlus2"
                  ndk { abiFilters 'arm64-v8a' }
              }
              aaptOptions { noCompress 'gguf' }
              externalNativeBuild { cmake { path "src/main/cpp/CMakeLists.txt" } }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

          cat << 'EOF' > app/src/main/java/com/zeeshan/ai/MainActivity.java
          package com.zeeshan.ai;
          import android.graphics.Color;
          import android.os.Bundle;
          import android.speech.tts.TextToSpeech;
          import android.view.Gravity;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import java.io.*;
          import java.util.Locale;

          public class MainActivity extends AppCompatActivity {
              private String path = "";
              private LinearLayout chat;
              private EditText input;
              private ScrollView scrollView;
              private TextToSpeech tts; 
              
              static { System.loadLibrary("z2_engine"); }
              public native String askZNative(String p, String m);

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  tts = new TextToSpeech(this, status -> {
                      if(status == TextToSpeech.SUCCESS) tts.setLanguage(new Locale("hi", "IN"));
                  });

                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setBackgroundColor(Color.BLACK);
                  root.setPadding(20, 20, 20, 20);
                  
                  // Title Bar: Zeeshan Z+² Chat
                  TextView title = new TextView(this);
                  title.setText("Zeeshan Z+² Chat");
                  title.setTextColor(Color.parseColor("#0284C7")); // BLUE
                  title.setTextSize(22);
                  title.setGravity(Gravity.CENTER);
                  title.setPadding(0, 0, 0, 20);
                  
                  scrollView = new ScrollView(this);
                  scrollView.setLayoutParams(new LinearLayout.LayoutParams(-1, 0, 1f));
                  chat = new LinearLayout(this); chat.setOrientation(LinearLayout.VERTICAL);
                  scrollView.addView(chat);
                  
                  input = new EditText(this);
                  input.setHint("Hindi/Urdu Baat karein...");
                  input.setTextColor(Color.WHITE);
                  input.setHintTextColor(Color.GRAY);
                  
                  Button send = new Button(this);
                  send.setText("SEND");
                  send.setTextColor(Color.parseColor("#4CAF50")); // GREEN
                  send.setOnClickListener(v -> {
                      String q = input.getText().toString();
                      if(!q.isEmpty() && !path.isEmpty()){
                          addText("You: " + q, "#0284C7");
                          input.setText("");
                          new Thread(() -> {
                              String r = askZNative(q, path);
                              runOnUiThread(() -> {
                                  addText("Z+²: " + r, "#4CAF50");
                                  tts.speak(r, TextToSpeech.QUEUE_FLUSH, null, null);
                              });
                          }).start();
                      }
                  });
                  
                  root.addView(title); root.addView(scrollView); root.addView(input); root.addView(send);
                  setContentView(root);
                  new Thread(this::copyM).start();
              }
              
              private void addText(String txt, String color) {
                  TextView tv = new TextView(this); tv.setText(txt);
                  tv.setTextColor(Color.parseColor(color));
                  tv.setPadding(0, 10, 0, 10); chat.addView(tv);
                  scrollView.post(() -> scrollView.fullScroll(ScrollView.FOCUS_DOWN));
              }

              private void copyM() {
                  try {
                      File f = new File(getFilesDir(), "z_model.gguf");
                      path = f.getAbsolutePath();
                      if (!f.exists()) {
                          InputStream is = getAssets().open("z_model.gguf");
                          FileOutputStream os = new FileOutputStream(f);
                          byte[] b = new byte[8192]; int l;
                          while ((l = is.read(b)) > 0) os.write(b, 0, l);
                          os.close(); is.close();
                      }
                  } catch (Exception e) {}
              }
          }
          EOF

          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <application android:icon="@drawable/ic_z_logo" android:label="Z+² Chat" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 9. Final Build
        run: |
          export ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/25.2.9519653
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 10. Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zeeshan-ZPlus2-Chat
          path: app/build/outputs/apk/debug/*.apk
