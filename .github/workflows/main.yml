name: Build Zeeshan Husain Smile Pro Calculator 2026

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21 (2026 Standard)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 1. Setup App Folders (Moved Up to Fix Error)
        run: |
          mkdir -p app/src/main/java/com/zeeshan/calculator
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/res/mipmap-xhdpi

      - name: 2. Setup Root Files
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "ZeeshanCalc"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          plugins {
              id 'com.android.application' version '8.7.0' apply false
          }
          EOF

      - name: 3. Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.10

      - name: 4. App Build Config (Targeting Android 16/SDK 36)
        run: |
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.zeeshan.calculator'
              compileSdk 36
              defaultConfig {
                  applicationId 'com.zeeshan.calculator'
                  minSdk 26
                  targetSdk 36
                  versionCode 3
                  versionName "3.0-2026-Ready"
              }
              compileOptions { 
                  sourceCompatibility JavaVersion.VERSION_21
                  targetCompatibility JavaVersion.VERSION_21 
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

      - name: 5. Themes, Colors & Drawables (Neumorphic Style)
        run: |
          cat << 'EOF' > app/src/main/res/values/colors.xml
          <resources>
              <color name="bg_color">#2C3333</color>
              <color name="btn_color">#395B64</color>
              <color name="text_color">#E7F6F2</color>
              <color name="accent_color">#F582A7</color>
              <color name="mic_color">#E53935</color>
          </resources>
          EOF

          cat << 'EOF' > app/src/main/res/values/themes.xml
          <resources>
              <style name="Theme.ZeeshanCalc" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="colorPrimary">@color/accent_color</item>
                  <item name="android:statusBarColor">@color/bg_color</item>
              </style>
          </resources>
          EOF
          
          cat << 'EOF' > app/src/main/res/drawable/bg_button.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="@color/btn_color"/>
              <corners android:radius="16dp"/>
              <stroke android:width="1dp" android:color="#5A7D8A"/>
          </shape>
          EOF

      - name: 6. Create Launcher Icons
        run: |
          cat << 'EOF' > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="@color/accent_color" android:pathData="M0,0h108v108h-108z"/>
          </vector>
          EOF
          cp app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          
          cp app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml app/src/main/res/mipmap-xhdpi/ic_launcher.xml
          cp app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml app/src/main/res/mipmap-xhdpi/ic_launcher_round.xml

      - name: 7. Create UI Layout (activity_main.xml)
        run: |
          cat << 'EOF' > app/src/main/res/layout/activity_main.xml
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="@color/bg_color" android:padding="16dp">
              
              <TextView android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:text="Zeeshan Husain Smile Pro AI Calc" android:textColor="@color/accent_color"
                  android:textSize="14sp" android:textStyle="bold" android:gravity="center" android:padding="8dp"/>

              <TextView android:id="@+id/tv_display"
                  android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1"
                  android:gravity="bottom|end" android:text="0" android:textColor="@color/text_color"
                  android:textSize="56sp" android:padding="16dp" android:maxLines="2" android:autoSizeTextType="uniform"/>

              <GridLayout android:id="@+id/grid_layout"
                  android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:columnCount="4" android:rowCount="6" android:useDefaultMargins="true" android:alignmentMode="alignBounds">
                  
                  <Button android:text="AC" android:background="@drawable/bg_button" android:textColor="@color/accent_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text="(" android:background="@drawable/bg_button" android:textColor="@color/accent_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text=")" android:background="@drawable/bg_button" android:textColor="@color/accent_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text="/" android:background="@drawable/bg_button" android:textColor="@color/accent_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>

                  <Button android:text="7" android:background="@drawable/bg_button" android:textColor="@color/text_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text="8" android:background="@drawable/bg_button" android:textColor="@color/text_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text="9" android:background="@drawable/bg_button" android:textColor="@color/text_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text="*" android:background="@drawable/bg_button" android:textColor="@color/accent_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>

                  <Button android:text="4" android:background="@drawable/bg_button" android:textColor="@color/text_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text="5" android:background="@drawable/bg_button" android:textColor="@color/text_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text="6" android:background="@drawable/bg_button" android:textColor="@color/text_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text="-" android:background="@drawable/bg_button" android:textColor="@color/accent_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>

                  <Button android:text="1" android:background="@drawable/bg_button" android:textColor="@color/text_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text="2" android:background="@drawable/bg_button" android:textColor="@color/text_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text="3" android:background="@drawable/bg_button" android:textColor="@color/text_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text="+" android:background="@drawable/bg_button" android:textColor="@color/accent_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>

                  <Button android:text="0" android:background="@drawable/bg_button" android:textColor="@color/text_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text="." android:background="@drawable/bg_button" android:textColor="@color/text_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text="DEL" android:background="@drawable/bg_button" android:textColor="#FFB74D" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text="=" android:backgroundTint="@color/accent_color" android:textColor="@color/bg_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>

                  <Button android:text="%" android:background="@drawable/bg_button" android:textColor="@color/accent_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text="^" android:background="@drawable/bg_button" android:textColor="@color/accent_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text="sqrt" android:background="@drawable/bg_button" android:textColor="@color/accent_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text="MIC" android:backgroundTint="@color/mic_color" android:textColor="@color/text_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
              </GridLayout>
          </LinearLayout>
          EOF

      - name: 8. Write AndroidManifest
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.VIBRATE" />
              <queries><intent><action android:name="android.intent.action.TTS_SERVICE" /></intent></queries>
              <application android:label="ZH Pro Calc" android:theme="@style/Theme.ZeeshanCalc" android:icon="@mipmap/ic_launcher" android:roundIcon="@mipmap/ic_launcher_round">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 9. Write Pro Math Engine & Voice Logic
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/calculator/MainActivity.java
          package com.zeeshan.calculator;
          import android.Manifest;
          import android.content.Context;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.os.Bundle;
          import android.os.Vibrator;
          import android.speech.RecognitionListener;
          import android.speech.RecognizerIntent;
          import android.speech.SpeechRecognizer;
          import android.speech.tts.TextToSpeech;
          import android.view.View;
          import android.widget.Button;
          import android.widget.GridLayout;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import java.util.ArrayList;
          import java.util.Locale;

          public class MainActivity extends AppCompatActivity {
              private TextToSpeech tts;
              private SpeechRecognizer speechRecognizer;
              private TextView display;
              private StringBuilder currentExpression = new StringBuilder();
              private Vibrator vibrator;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  display = findViewById(R.id.tv_display);
                  vibrator = (Vibrator) getSystemService(Context.VIBRATOR_SERVICE);

                  tts = new TextToSpeech(this, status -> {
                      if (status == TextToSpeech.SUCCESS) tts.setLanguage(new Locale("en", "IN"));
                  });

                  if (SpeechRecognizer.isRecognitionAvailable(this)) {
                      speechRecognizer = SpeechRecognizer.createSpeechRecognizer(this);
                      speechRecognizer.setRecognitionListener(new RecognitionListener() {
                          @Override public void onReadyForSpeech(Bundle params) {}
                          @Override public void onBeginningOfSpeech() { display.setText("Listening..."); }
                          @Override public void onRmsChanged(float rmsdB) {}
                          @Override public void onBufferReceived(byte[] buffer) {}
                          @Override public void onEndOfSpeech() {}
                          @Override public void onError(int error) { display.setText(currentExpression.toString()); }
                          @Override public void onResults(Bundle results) {
                              ArrayList<String> matches = results.getStringArrayList(SpeechRecognizer.RESULTS_RECOGNITION);
                              if (matches != null && !matches.isEmpty()) {
                                  String spokenText = matches.get(0).toLowerCase();
                                  processVoiceCommand(spokenText);
                              }
                          }
                          @Override public void onPartialResults(Bundle partialResults) {}
                          @Override public void onEvent(int eventType, Bundle params) {}
                      });
                  }

                  GridLayout grid = findViewById(R.id.grid_layout);
                  for (int i = 0; i < grid.getChildCount(); i++) {
                      View child = grid.getChildAt(i);
                      if (child instanceof Button) {
                          child.setOnClickListener(v -> onButtonClick((Button) v));
                      }
                  }
              }

              private void onButtonClick(Button button) {
                  if (vibrator != null && vibrator.hasVibrator()) { vibrator.vibrate(30); }
                  
                  String btnText = button.getText().toString();
                  if (btnText.equals("AC")) {
                      currentExpression.setLength(0);
                      display.setText("0");
                  } else if (btnText.equals("DEL")) {
                      if (currentExpression.length() > 0) {
                          currentExpression.deleteCharAt(currentExpression.length() - 1);
                          display.setText(currentExpression.length() == 0 ? "0" : currentExpression.toString());
                      }
                  } else if (btnText.equals("MIC")) {
                      startVoiceInput();
                  } else if (btnText.equals("=")) {
                      calculateResult();
                  } else {
                      if (isOperator(btnText.charAt(0)) && currentExpression.length() > 0) {
                          char lastChar = currentExpression.charAt(currentExpression.length() - 1);
                          if (isOperator(lastChar)) {
                              currentExpression.deleteCharAt(currentExpression.length() - 1);
                          }
                      }
                      if (display.getText().toString().equals("0") || display.getText().toString().equals("Error")) {
                          if (!isOperator(btnText.charAt(0)) && !btnText.equals(".")) {
                              currentExpression.setLength(0);
                          }
                      }
                      currentExpression.append(btnText);
                      display.setText(currentExpression.toString());
                  }
              }

              private boolean isOperator(char c) { return c == '+' || c == '-' || c == '*' || c == '/' || c == '^'; }

              private void startVoiceInput() {
                  if (ContextCompat.checkSelfPermission(this, Manifest.permission.RECORD_AUDIO) != PackageManager.PERMISSION_GRANTED) {
                      ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.RECORD_AUDIO}, 1);
                  } else if (speechRecognizer != null) {
                      Intent intent = new Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH);
                      intent.putExtra(RecognizerIntent.EXTRA_LANGUAGE_MODEL, RecognizerIntent.LANGUAGE_MODEL_FREE_FORM);
                      intent.putExtra(RecognizerIntent.EXTRA_LANGUAGE, Locale.getDefault());
                      speechRecognizer.startListening(intent);
                  }
              }

              private void processVoiceCommand(String text) {
                  text = text.replace("plus", "+").replace("minus", "-")
                             .replace("multiply", "*").replace("divided by", "/")
                             .replace("divide", "/").replace("into", "*")
                             .replace("x", "*").replaceAll("[^0-9+\\-*/().^%]", "");
                  currentExpression.setLength(0);
                  currentExpression.append(text);
                  display.setText(currentExpression.toString());
                  calculateResult();
              }

              private void calculateResult() {
                  try {
                      String mathExpression = currentExpression.toString().replace("sqrt", "s");
                      if (mathExpression.isEmpty()) return;
                      
                      double result = eval(mathExpression);
                      String finalResult = (result == (long) result) ? String.format(Locale.US, "%d", (long) result) : String.format(Locale.US, "%s", result);
                      
                      display.setText(finalResult);
                      currentExpression.setLength(0);
                      currentExpression.append(finalResult);

                      if (tts != null) { tts.speak("Result is " + finalResult, TextToSpeech.QUEUE_FLUSH, null, null); }
                  } catch (Exception e) {
                      display.setText("Error");
                      currentExpression.setLength(0);
                  }
              }

              private double eval(final String str) {
                  return new Object() {
                      int pos = -1, ch;
                      void nextChar() { ch = (++pos < str.length()) ? str.charAt(pos) : -1; }
                      boolean eat(int charToEat) {
                          while (ch == ' ') nextChar();
                          if (ch == charToEat) { nextChar(); return true; }
                          return false;
                      }
                      double parse() { nextChar(); double x = parseExpression(); return x; }
                      double parseExpression() {
                          double x = parseTerm();
                          for (;;) { if (eat('+')) x += parseTerm(); else if (eat('-')) x -= parseTerm(); else return x; }
                      }
                      double parseTerm() {
                          double x = parseFactor();
                          for (;;) { if (eat('*')) x *= parseFactor(); else if (eat('/')) x /= parseFactor(); else return x; }
                      }
                      double parseFactor() {
                          if (eat('+')) return parseFactor(); if (eat('-')) return -parseFactor();
                          double x;
                          int startPos = this.pos;
                          if (eat('(')) { x = parseExpression(); eat(')'); }
                          else if ((ch >= '0' && ch <= '9') || ch == '.') { 
                              while ((ch >= '0' && ch <= '9') || ch == '.') nextChar(); 
                              x = Double.parseDouble(str.substring(startPos, this.pos)); 
                          }
                          else if (eat('s')) { x = Math.sqrt(parseFactor()); }
                          else { throw new RuntimeException("Unexpected: " + (char)ch); }
                          
                          if (eat('^')) x = Math.pow(x, parseFactor());
                          if (eat('%')) x = x / 100;
                          return x;
                      }
                  }.parse();
              }

              @Override
              protected void onDestroy() {
                  if (tts != null) { tts.stop(); tts.shutdown(); }
                  if (speechRecognizer != null) { speechRecognizer.destroy(); }
                  super.onDestroy();
              }
          }
          EOF

      - name: 10. Build Final APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 11. Upload Final Pro APK
        uses: actions/upload-artifact@v4
        with:
          name: Zeeshan-Husain-Smile-Voice-Pro-Calc-2026
          path: app/build/outputs/apk/debug/app-debug.apk
