name: Build Zeeshan Ai Chat (Final Theme Fixed)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: 4. Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/zeeshan/ai
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/cpp

          # Repository Fix
          cat << 'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS); repositories { google(); mavenCentral() } }
          rootProject.name = "Zeeshan Ai Chat"
          include ':app'
          EOF

          echo "android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx6g" > gradle.properties

      - name: 5. Download 2GB Google Gemma-2 Brain
        run: |
          # 2GB Gemma-2 Model (High Quality Q5)
          wget -q --show-progress https://huggingface.co/bartowski/gemma-2-2b-it-GGUF/resolve/main/gemma-2-2b-it-Q5_K_M.gguf -O app/src/main/assets/z2_model.gguf

      - name: 6. Setup Icon & Engine
        run: |
          git clone --branch b3561 --depth 1 https://github.com/ggml-org/llama.cpp app/src/main/cpp/llama
          wget -q --show-progress "https://cdn-icons-png.flaticon.com/512/2103/2103633.png" -O app/src/main/res/drawable/ic_z2_logo.png

      - name: 7. Write C++ Engine (Asli Accelerator)
        run: |
          cat << 'EOF' > app/src/main/cpp/CMakeLists.txt
          cmake_minimum_required(VERSION 3.22.1)
          project("z2_engine")
          add_subdirectory(llama)
          add_library(${CMAKE_PROJECT_NAME} SHARED native-lib.cpp)
          target_include_directories(${CMAKE_PROJECT_NAME} PRIVATE llama/include llama)
          target_link_libraries(${CMAKE_PROJECT_NAME} llama log)
          EOF

          cat << 'EOF' > app/src/main/cpp/native-lib.cpp
          #include <jni.h>
          #include <string>
          #include <vector>
          #include "llama.h"

          extern "C" JNIEXPORT jstring JNICALL
          Java_com_zeeshan_ai_MainActivity_askZ2Native(JNIEnv* env, jobject, jstring prompt, jstring modelPath) {
              const char *userText = env->GetStringUTFChars(prompt, 0);
              const char *path = env->GetStringUTFChars(modelPath, 0);
              
              llama_backend_init();
              auto mparams = llama_model_default_params();
              llama_model * model = llama_load_model_from_file(path, mparams);
              
              if (!model) return env->NewStringUTF("Error: Engine Load Failed!");

              auto cparams = llama_context_default_params();
              cparams.n_ctx = 2048; 
              cparams.n_threads = 4; 
              llama_context * ctx = llama_new_context_with_model(model, cparams);

              std::vector<llama_token> tokens(2048);
              int n_tokens = llama_tokenize(model, userText, strlen(userText), tokens.data(), tokens.size(), true, true);
              
              llama_batch batch = llama_batch_get_one(tokens.data(), n_tokens, 0, 0);
              llama_decode(ctx, batch);

              std::string ai_reply = "";
              int n_vocab = llama_n_vocab(model);

              for (int step = 0; step < 512; step++) {
                  float * logits = llama_get_logits_ith(ctx, batch.n_tokens - 1);
                  llama_token id = 0; float max_p = -1e9f;
                  for (int i = 0; i < n_vocab; i++) { if (logits[i] > max_p) { max_p = logits[i]; id = i; } }

                  if (llama_token_is_eog(model, id)) break; 
                  char buf[128];
                  int n = llama_token_to_piece(model, id, buf, sizeof(buf), 0, true);
                  if (n > 0) ai_reply += std::string(buf, n);

                  batch = llama_batch_get_one(&id, 1, n_tokens + step, 0);
                  if (llama_decode(ctx, batch) != 0) break;
              }

              llama_free(ctx);
              llama_free_model(model);
              llama_backend_free();
              env->ReleaseStringUTFChars(prompt, userText);
              env->ReleaseStringUTFChars(modelPath, path);
              return env->NewStringUTF(ai_reply.c_str());
          }
          EOF

      - name: 8. Write Theme, Build Gradle & Java UI
        run: |
          # --- THEME FIX: Asli Sajawat ki File ---
          cat << 'EOF' > app/src/main/res/values/styles.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">#000000</item>
                  <item name="colorPrimaryDark">#000000</item>
                  <item name="colorAccent">#E91E63</item>
              </style>
          </resources>
          EOF

          cat << 'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          EOF

          # --- FIX: Dependencies yahan lagai gayi hain ---
          cat << 'EOF' > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.zeeshan.ai'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.zeeshan.ai'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "28.0-Theme-Fix"
                  ndk { abiFilters 'arm64-v8a' }
              }
              aaptOptions { noCompress 'gguf' }
              externalNativeBuild { cmake { path "src/main/cpp/CMakeLists.txt" } }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          cat << 'EOF' > app/src/main/java/com/zeeshan/ai/MainActivity.java
          package com.zeeshan.ai;
          import android.Manifest;
          import android.content.Intent;
          import android.graphics.Color;
          import android.os.Build;
          import android.os.Bundle;
          import android.speech.RecognizerIntent;
          import android.speech.tts.TextToSpeech;
          import android.view.Gravity;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;
          import java.io.*;
          import java.util.ArrayList;
          import java.util.Locale;

          public class MainActivity extends AppCompatActivity {
              private String path = "", chatHistory = "";
              private LinearLayout chat;
              private EditText input;
              private ScrollView scrollView;
              private TextToSpeech tts; 
              
              static { System.loadLibrary("z2_engine"); }
              public native String askZ2Native(String p, String m);

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.READ_MEDIA_IMAGES, Manifest.permission.RECORD_AUDIO}, 1);
                  } else {
                      ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.READ_EXTERNAL_STORAGE, Manifest.permission.RECORD_AUDIO}, 1);
                  }

                  tts = new TextToSpeech(this, status -> {
                      if(status == TextToSpeech.SUCCESS) tts.setLanguage(new Locale("hi", "IN"));
                  });

                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setBackgroundColor(Color.BLACK); // KALA
                  root.setPadding(20, 20, 20, 20);
                  
                  LinearLayout header = new LinearLayout(this);
                  header.setGravity(Gravity.CENTER_VERTICAL);
                  header.setPadding(0, 0, 0, 30);
                  
                  ImageView logo = new ImageView(this);
                  logo.setImageResource(R.drawable.ic_z2_logo);
                  header.addView(logo, 100, 100);
                  
                  TextView title = new TextView(this);
                  title.setText(" Zeeshan Ai Chat");
                  title.setTextColor(Color.parseColor("#E91E63")); // GULLU
                  title.setTextSize(20);
                  header.addView(title, new LinearLayout.LayoutParams(0, -2, 1f));
                  
                  TextView menu = new TextView(this);
                  menu.setText("⋮");
                  menu.setTextColor(Color.parseColor("#4CAF50")); // HARA
                  menu.setTextSize(30);
                  menu.setPadding(20, 0, 20, 0);
                  menu.setOnClickListener(v -> {
                      PopupMenu p = new PopupMenu(this, menu);
                      p.getMenu().add("♻️ Clear Memory");
                      p.setOnMenuItemClickListener(item -> {
                          chatHistory = ""; chat.removeAllViews();
                          Toast.makeText(this, "Memory Cleaned!", Toast.LENGTH_SHORT).show();
                          return true;
                      });
                      p.show();
                  });
                  header.addView(menu);

                  scrollView = new ScrollView(this);
                  scrollView.setLayoutParams(new LinearLayout.LayoutParams(-1, 0, 1f));
                  chat = new LinearLayout(this); chat.setOrientation(LinearLayout.VERTICAL);
                  scrollView.addView(chat);
                  
                  LinearLayout bottomBar = new LinearLayout(this);
                  bottomBar.setGravity(Gravity.CENTER_VERTICAL);
                  
                  Button galBtn = new Button(this); galBtn.setText("🖼️");
                  galBtn.setBackgroundColor(Color.TRANSPARENT);
                  galBtn.setOnClickListener(v -> {
                      Intent i = new Intent(Intent.ACTION_PICK, android.provider.MediaStore.Images.Media.EXTERNAL_CONTENT_URI);
                      startActivityForResult(i, 200);
                  });

                  Button micBtn = new Button(this); micBtn.setText("🎤");
                  micBtn.setBackgroundColor(Color.TRANSPARENT);
                  micBtn.setOnClickListener(v -> {
                      Intent i = new Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH);
                      i.putExtra(RecognizerIntent.EXTRA_LANGUAGE_MODEL, RecognizerIntent.LANGUAGE_MODEL_FREE_FORM);
                      startActivityForResult(i, 100);
                  });

                  input = new EditText(this);
                  input.setHint("Yahan Type Karein...");
                  input.setTextColor(Color.WHITE);
                  input.setLayoutParams(new LinearLayout.LayoutParams(0, -2, 1f));
                  
                  Button send = new Button(this);
                  send.setText("SEND");
                  send.setTextColor(Color.parseColor("#4CAF50")); // HARA
                  send.setBackgroundColor(Color.TRANSPARENT);
                  send.setOnClickListener(v -> {
                      String q = input.getText().toString();
                      if(!q.isEmpty() && !path.isEmpty()){
                          addText("You: " + q, "#E91E63"); // GULLU
                          input.setText("");
                          chatHistory += "User: " + q + "\nZeeshan Ai: ";
                          new Thread(() -> {
                              String r = askZ2Native(chatHistory, path);
                              runOnUiThread(() -> {
                                  addText("Zeeshan Ai: " + r, "#4CAF50"); // HARA
                                  chatHistory += r + "\n";
                                  tts.speak(r, TextToSpeech.QUEUE_FLUSH, null, null);
                              });
                          }).start();
                      }
                  });
                  
                  bottomBar.addView(galBtn); bottomBar.addView(micBtn);
                  bottomBar.addView(input); bottomBar.addView(send);
                  
                  root.addView(header); root.addView(scrollView); root.addView(bottomBar);
                  setContentView(root);
                  new Thread(this::copyM).start();
              }
              
              private void addText(String txt, String color) {
                  TextView tv = new TextView(this);
                  tv.setText(txt); tv.setTextColor(Color.parseColor(color));
                  tv.setPadding(0, 10, 0, 10); tv.setTextSize(16);
                  chat.addView(tv);
                  scrollView.post(() -> scrollView.fullScroll(ScrollView.FOCUS_DOWN));
              }

              private void copyM() {
                  try {
                      File f = new File(getFilesDir(), "z2_model.gguf");
                      path = f.getAbsolutePath();
                      if (!f.exists()) {
                          InputStream is = getAssets().open("z2_model.gguf");
                          FileOutputStream os = new FileOutputStream(f);
                          byte[] b = new byte[8192]; int l;
                          while ((l = is.read(b)) > 0) os.write(b, 0, l);
                          os.close(); is.close();
                      }
                  } catch (Exception e) {}
              }
          }
          EOF

          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
              <application android:icon="@drawable/ic_z2_logo" android:label="Z+2 Ai" android:theme="@style/AppTheme">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 9. Final Build
        run: |
          export ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/25.2.9519653
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 10. Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Zeeshan-Ai-Theme-Fixed
          path: app/build/outputs/apk/debug/*.apk
