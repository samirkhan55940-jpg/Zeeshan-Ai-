name: Build Z+² AI Premium Calculator

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Stable Standard)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 1. Create App Directory Structure
        run: |
          mkdir -p app/src/main/java/com/zeeshan/calculator
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/values-night
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/res/mipmap-xhdpi

      - name: 2. Initialize Gradle System
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "ZPlusSquared"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          plugins { id 'com.android.application' version '8.3.0' apply false }
          EOF

          cat << 'EOF' > gradle.properties
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          gradle wrapper --gradle-version 8.4

      - name: 3. Setup Android Build Configuration
        run: |
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.zeeshan.calculator'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.zeeshan.calculator'
                  minSdk 26
                  targetSdk 34
                  versionCode 8
                  versionName "8.0-Z-AI-Master"
              }
              compileOptions { 
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17 
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

      - name: 4. Setup Premium Colors & Themes (Light/Dark)
        run: |
          cat << 'EOF' > app/src/main/res/values/colors.xml
          <resources>
              <color name="bg_main">#F0F2F5</color>
              <color name="bg_chat">#E4EFE7</color>
              <color name="btn_num">#FFFFFF</color>
              <color name="btn_top">#E0E5EC</color>
              <color name="btn_op">#FF9800</color>
              <color name="text_main">#2A3543</color>
              <color name="text_sec">#8A9AAB</color>
              <color name="z_logo">#1B5E20</color>
          </resources>
          EOF

          cat << 'EOF' > app/src/main/res/values-night/colors.xml
          <resources>
              <color name="bg_main">#1A212D</color>
              <color name="bg_chat">#0B141B</color>
              <color name="btn_num">#2C3A4A</color>
              <color name="btn_top">#344152</color>
              <color name="btn_op">#00E676</color>
              <color name="text_main">#FFFFFF</color>
              <color name="text_sec">#8A9AAB</color>
              <color name="z_logo">#00FF87</color>
          </resources>
          EOF

          cat << 'EOF' > app/src/main/res/values/themes.xml
          <resources>
              <style name="Theme.ZeeshanCalc" parent="Theme.AppCompat.DayNight.NoActionBar">
                  <item name="android:windowBackground">@color/bg_main</item>
                  <item name="android:statusBarColor">@color/bg_main</item>
              </style>
          </resources>
          EOF

      - name: 5. Create Button Assets
        run: |
          cat << 'EOF' > app/src/main/res/drawable/bg_btn_num.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="@color/btn_num"/>
              <stroke android:width="1dp" android:color="#1A000000"/>
          </shape>
          EOF
          cat << 'EOF' > app/src/main/res/drawable/bg_btn_top.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="@color/btn_top"/>
          </shape>
          EOF
          cat << 'EOF' > app/src/main/res/drawable/bg_btn_op.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="@color/btn_op"/>
          </shape>
          EOF
          cat << 'EOF' > app/src/main/res/drawable/bg_btn_zero.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="@color/btn_num"/>
              <corners android:radius="40dp"/>
              <stroke android:width="1dp" android:color="#1A000000"/>
          </shape>
          EOF
          cat << 'EOF' > app/src/main/res/drawable/bg_chat_input.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="@color/btn_top"/>
              <corners android:radius="24dp"/>
          </shape>
          EOF

      - name: 6. Build Master UI (Calculator + AI Chat + Sidebar)
        run: |
          cat << 'EOF' > app/src/main/res/layout/activity_main.xml
          <androidx.drawerlayout.widget.DrawerLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:id="@+id/drawer_layout"
              android:layout_width="match_parent" android:layout_height="match_parent">

              <RelativeLayout android:layout_width="match_parent" android:layout_height="match_parent" android:background="@color/bg_main">
                  
                  <LinearLayout android:id="@+id/top_bar" android:layout_width="match_parent" android:layout_height="60dp" android:orientation="horizontal" android:gravity="center_vertical" android:padding="10dp">
                      <Button android:id="@+id/btn_menu" android:layout_width="45dp" android:layout_height="45dp" android:background="@drawable/bg_btn_top" android:text="≡" android:textColor="@color/text_main" android:textSize="22sp"/>
                      <TextView android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:text="Zeeshan" android:textColor="@color/text_main" android:textSize="22sp" android:textStyle="bold" android:gravity="center"/>
                      <Button android:id="@+id/btn_z_ai" android:layout_width="70dp" android:layout_height="45dp" android:background="@drawable/bg_btn_top" android:text="Z+²" android:textColor="@color/z_logo" android:textSize="18sp" android:textStyle="bold"/>
                  </LinearLayout>

                  <LinearLayout android:id="@+id/chat_container" android:layout_width="match_parent" android:layout_height="match_parent" android:layout_below="@id/top_bar" android:orientation="vertical" android:background="@color/bg_chat" android:visibility="gone">
                      <ScrollView android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1">
                          <TextView android:id="@+id/tv_chat_logs" android:layout_width="match_parent" android:layout_height="wrap_content" android:padding="15dp" android:textColor="@color/text_main" android:textSize="18sp" android:text="Z+² AI: Hello! Main aapka math assistant hoon. Puchiye jo puchna hai...\n\n"/>
                      </ScrollView>
                      <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:padding="10dp" android:gravity="center_vertical" android:background="@color/bg_main">
                          <EditText android:id="@+id/et_chat_input" android:layout_width="0dp" android:layout_height="50dp" android:layout_weight="1" android:background="@drawable/bg_chat_input" android:hint="Type or speak math..." android:paddingStart="15dp" android:textColorHint="@color/text_sec" android:textColor="@color/text_main"/>
                          <Button android:id="@+id/btn_send_chat" android:layout_width="50dp" android:layout_height="50dp" android:layout_marginStart="10dp" android:background="@drawable/bg_btn_op" android:text="➤" android:textColor="#FFF" android:textSize="20sp"/>
                          <Button android:id="@+id/btn_mic_chat" android:layout_width="50dp" android:layout_height="50dp" android:layout_marginStart="5dp" android:background="@drawable/bg_btn_top" android:text="🎤" android:textColor="@color/text_main"/>
                      </LinearLayout>
                  </LinearLayout>

                  <LinearLayout android:id="@+id/calc_container" android:layout_width="match_parent" android:layout_height="match_parent" android:layout_below="@id/top_bar" android:orientation="vertical" android:padding="20dp">
                      <LinearLayout android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1" android:orientation="vertical" android:gravity="bottom|end" android:paddingBottom="20dp">
                          <TextView android:id="@+id/tv_expression" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="" android:textColor="@color/text_sec" android:textSize="24sp"/>
                          <TextView android:id="@+id/tv_display" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="0" android:textColor="@color/text_main" android:textSize="64sp" android:maxLines="1"/>
                      </LinearLayout>

                      <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical">
                          <LinearLayout android:layout_width="match_parent" android:layout_height="75dp" android:orientation="horizontal" android:layout_marginBottom="12dp">
                              <androidx.appcompat.widget.AppCompatButton android:text="AC" android:textColor="@color/text_main" android:background="@drawable/bg_btn_top" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="22sp"/>
                              <androidx.appcompat.widget.AppCompatButton android:text="+/-" android:textColor="@color/text_main" android:background="@drawable/bg_btn_top" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="22sp"/>
                              <androidx.appcompat.widget.AppCompatButton android:text="DEL" android:textColor="@color/text_main" android:background="@drawable/bg_btn_top" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="18sp"/>
                              <androidx.appcompat.widget.AppCompatButton android:text="÷" android:textColor="#FFFFFF" android:background="@drawable/bg_btn_op" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:textSize="28sp"/>
                          </LinearLayout>
                          <LinearLayout android:layout_width="match_parent" android:layout_height="75dp" android:orientation="horizontal" android:layout_marginBottom="12dp">
                              <androidx.appcompat.widget.AppCompatButton android:text="7" android:textColor="@color/text_main" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                              <androidx.appcompat.widget.AppCompatButton android:text="8" android:textColor="@color/text_main" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                              <androidx.appcompat.widget.AppCompatButton android:text="9" android:textColor="@color/text_main" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                              <androidx.appcompat.widget.AppCompatButton android:text="×" android:textColor="#FFFFFF" android:background="@drawable/bg_btn_op" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:textSize="28sp"/>
                          </LinearLayout>
                          <LinearLayout android:layout_width="match_parent" android:layout_height="75dp" android:orientation="horizontal" android:layout_marginBottom="12dp">
                              <androidx.appcompat.widget.AppCompatButton android:text="4" android:textColor="@color/text_main" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                              <androidx.appcompat.widget.AppCompatButton android:text="5" android:textColor="@color/text_main" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                              <androidx.appcompat.widget.AppCompatButton android:text="6" android:textColor="@color/text_main" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                              <androidx.appcompat.widget.AppCompatButton android:text="-" android:textColor="#FFFFFF" android:background="@drawable/bg_btn_op" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:textSize="32sp"/>
                          </LinearLayout>
                          <LinearLayout android:layout_width="match_parent" android:layout_height="75dp" android:orientation="horizontal" android:layout_marginBottom="12dp">
                              <androidx.appcompat.widget.AppCompatButton android:text="1" android:textColor="@color/text_main" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                              <androidx.appcompat.widget.AppCompatButton android:text="2" android:textColor="@color/text_main" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                              <androidx.appcompat.widget.AppCompatButton android:text="3" android:textColor="@color/text_main" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                              <androidx.appcompat.widget.AppCompatButton android:text="+" android:textColor="#FFFFFF" android:background="@drawable/bg_btn_op" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:textSize="28sp"/>
                          </LinearLayout>
                          <LinearLayout android:layout_width="match_parent" android:layout_height="75dp" android:orientation="horizontal">
                              <androidx.appcompat.widget.AppCompatButton android:text="0" android:textColor="@color/text_main" android:background="@drawable/bg_btn_zero" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="2" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                              <androidx.appcompat.widget.AppCompatButton android:text="." android:textColor="@color/text_main" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                              <androidx.appcompat.widget.AppCompatButton android:text="=" android:textColor="#FFFFFF" android:background="@drawable/bg_btn_op" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:textSize="28sp"/>
                          </LinearLayout>
                      </LinearLayout>
                  </LinearLayout>
              </RelativeLayout>

              <LinearLayout android:layout_width="260dp" android:layout_height="match_parent" android:layout_gravity="start" android:background="@color/bg_main" android:orientation="vertical" android:padding="20dp">
                  <TextView android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Menu" android:textSize="26sp" android:textStyle="bold" android:textColor="@color/z_logo" android:layout_marginBottom="30dp"/>
                  <Button android:id="@+id/nav_history" android:layout_width="match_parent" android:layout_height="50dp" android:text="History" android:background="@drawable/bg_btn_top" android:textColor="@color/text_main" android:layout_marginBottom="15dp"/>
                  <Button android:id="@+id/nav_theme" android:layout_width="match_parent" android:layout_height="50dp" android:text="Theme Mode" android:background="@drawable/bg_btn_top" android:textColor="@color/text_main"/>
              </LinearLayout>
          </androidx.drawerlayout.widget.DrawerLayout>
          EOF

      - name: 7. Inject AndroidManifest
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.VIBRATE" />
              <queries><intent><action android:name="android.intent.action.TTS_SERVICE" /></intent></queries>
              <application android:label="Z+² AI Calc" android:theme="@style/Theme.ZeeshanCalc" android:icon="@mipmap/ic_launcher">
                  <activity android:name=".MainActivity" android:exported="true" android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 8. The Z+² Local AI Engine (Java Logic)
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/calculator/MainActivity.java
          package com.zeeshan.calculator;
          import android.Manifest;
          import android.app.AlertDialog;
          import android.content.Context;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.content.res.Configuration;
          import android.os.Bundle;
          import android.os.Vibrator;
          import android.speech.RecognitionListener;
          import android.speech.RecognizerIntent;
          import android.speech.SpeechRecognizer;
          import android.speech.tts.TextToSpeech;
          import android.view.View;
          import android.view.ViewGroup;
          import android.view.inputmethod.InputMethodManager;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.appcompat.app.AppCompatDelegate;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import androidx.core.view.GravityCompat;
          import androidx.drawerlayout.widget.DrawerLayout;
          import java.util.ArrayList;
          import java.util.Locale;

          public class MainActivity extends AppCompatActivity {
              private DrawerLayout drawerLayout;
              private TextToSpeech tts;
              private SpeechRecognizer speechRecognizer;
              private TextView display, expressionDisplay, chatLogs;
              private EditText chatInput;
              private LinearLayout chatContainer, calcContainer;
              private StringBuilder currentExpression = new StringBuilder();
              private Vibrator vibrator;
              private ArrayList<String> historyList = new ArrayList<>();
              private String lastResultMemory = "";
              private boolean isChatOpen = false;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  
                  display = findViewById(R.id.tv_display);
                  expressionDisplay = findViewById(R.id.tv_expression);
                  chatLogs = findViewById(R.id.tv_chat_logs);
                  chatInput = findViewById(R.id.et_chat_input);
                  chatContainer = findViewById(R.id.chat_container);
                  calcContainer = findViewById(R.id.calc_container);
                  drawerLayout = findViewById(R.id.drawer_layout);
                  vibrator = (Vibrator) getSystemService(Context.VIBRATOR_SERVICE);

                  tts = new TextToSpeech(this, status -> {
                      if (status == TextToSpeech.SUCCESS) tts.setLanguage(new Locale("en", "IN"));
                  });
                  setupVoice();
                  
                  // Setup Classic Calculator Buttons
                  setupButtons(findViewById(R.id.calc_container));

                  // Sidebar Actions
                  findViewById(R.id.btn_menu).setOnClickListener(v -> drawerLayout.openDrawer(GravityCompat.START));
                  findViewById(R.id.nav_history).setOnClickListener(v -> { drawerLayout.closeDrawer(GravityCompat.START); showHistoryDialog(); });
                  findViewById(R.id.nav_theme).setOnClickListener(v -> {
                      drawerLayout.closeDrawer(GravityCompat.START);
                      int currentNightMode = getResources().getConfiguration().uiMode & Configuration.UI_MODE_NIGHT_MASK;
                      AppCompatDelegate.setDefaultNightMode(currentNightMode == Configuration.UI_MODE_NIGHT_YES ? AppCompatDelegate.MODE_NIGHT_NO : AppCompatDelegate.MODE_NIGHT_YES);
                  });

                  // Z+² AI Toggle
                  findViewById(R.id.btn_z_ai).setOnClickListener(v -> {
                      isChatOpen = !isChatOpen;
                      chatContainer.setVisibility(isChatOpen ? View.VISIBLE : View.GONE);
                      calcContainer.setVisibility(isChatOpen ? View.GONE : View.VISIBLE);
                      if (vibrator != null) vibrator.vibrate(30);
                  });

                  // AI Chat Actions
                  findViewById(R.id.btn_send_chat).setOnClickListener(v -> {
                      String q = chatInput.getText().toString();
                      if(!q.isEmpty()) { processNaturalLanguageAI(q); chatInput.setText(""); hideKeyboard(); }
                  });
                  findViewById(R.id.btn_mic_chat).setOnClickListener(v -> startVoiceInput());
              }

              private void setupButtons(View view) {
                  if (view instanceof ViewGroup) {
                      ViewGroup group = (ViewGroup) view;
                      for (int i = 0; i < group.getChildCount(); i++) setupButtons(group.getChildAt(i));
                  } else if (view instanceof Button && view.getId() == View.NO_ID) {
                      view.setOnClickListener(v -> onButtonClick((Button) v));
                  }
              }

              private void onButtonClick(Button button) {
                  if (vibrator != null) vibrator.vibrate(20);
                  String btnText = button.getText().toString();
                  if (btnText.equals("AC")) { currentExpression.setLength(0); display.setText("0"); expressionDisplay.setText(""); }
                  else if (btnText.equals("DEL")) { if (currentExpression.length() > 0) { currentExpression.deleteCharAt(currentExpression.length() - 1); display.setText(currentExpression.length() == 0 ? "0" : currentExpression.toString()); } }
                  else if (btnText.equals("+/-")) { if (currentExpression.length() > 0 && !display.getText().toString().equals("Error")) { if (currentExpression.charAt(0) == '-') currentExpression.deleteCharAt(0); else currentExpression.insert(0, "-"); display.setText(currentExpression.toString()); } }
                  else if (btnText.equals("=")) { calculateResult(); }
                  else {
                      if (display.getText().toString().equals("0") || display.getText().toString().equals("Error")) { if (!btnText.equals("÷") && !btnText.equals("×") && !btnText.equals("+") && !btnText.equals("-") && !btnText.equals(".")) currentExpression.setLength(0); }
                      currentExpression.append(btnText); display.setText(currentExpression.toString());
                  }
              }

              // ================= THE LOCAL AI BRAIN =================
              private void processNaturalLanguageAI(String text) {
                  String originalText = text;
                  chatLogs.append("\nYou: " + originalText + "\n");
                  text = text.toLowerCase().trim();
                  
                  // Memory Logic
                  if (text.startsWith("multiply by") || text.startsWith("add") || text.startsWith("subtract") || text.startsWith("divide by") || text.startsWith("is mein")) {
                      if (!lastResultMemory.isEmpty()) text = lastResultMemory + " " + text;
                  }
                  
                  // Multi-lingual Math Translation (Hindi/Urdu/English)
                  text = text.replace("ka", "*").replace("of", "*");
                  text = text.replace("percent", "%").replace("pratishat", "%").replace("feesad", "%");
                  text = text.replace("plus", "+").replace("aur", "+").replace("add", "+");
                  text = text.replace("minus", "-").replace("subtract", "-").replace("ghatao", "-");
                  text = text.replace("multiply", "*").replace("into", "*").replace("guna", "*");
                  text = text.replace("divide", "/").replace("bhag", "/").replace("taqseem", "/");
                  text = text.replace("x", "*").replace("times", "*");
                  text = text.replace("÷", "/").replace("×", "*");
                  
                  // Geometry Engine Add-on
                  if(originalText.toLowerCase().contains("circle") || originalText.toLowerCase().contains("daire")) {
                      chatLogs.append("Z+² AI: Circle ka area formula πr² hota hai. Pura math likhein solve karne ke liye.\n");
                      if (tts != null) tts.speak("Circle area formula is pi R square", TextToSpeech.QUEUE_FLUSH, null, null);
                      return;
                  }

                  String parsedEquation = text.replaceAll("[^0-9+\\-*/().%]", "");
                  if(parsedEquation.isEmpty()) {
                      chatLogs.append("Z+² AI: Mujhe samajh nahi aaya. Kripya math sawal puchiye.\n");
                      if (tts != null) tts.speak("I didn't understand. Please ask a math question.", TextToSpeech.QUEUE_FLUSH, null, null);
                      return;
                  }

                  try {
                      double result = eval(parsedEquation);
                      String finalResult = (result == (long) result) ? String.format(Locale.US, "%d", (long) result) : String.format(Locale.US, "%s", result);
                      
                      lastResultMemory = finalResult;
                      historyList.add(parsedEquation + " = " + finalResult);
                      
                      chatLogs.append("Z+² AI: Answer hai " + finalResult + "\n");
                      if (tts != null) tts.speak("Answer is " + finalResult, TextToSpeech.QUEUE_FLUSH, null, null);
                      
                      // Also update classic calculator
                      display.setText(finalResult);
                      expressionDisplay.setText(parsedEquation);
                      currentExpression.setLength(0);
                      currentExpression.append(finalResult);

                  } catch (Exception e) {
                      chatLogs.append("Z+² AI: Calculation Error!\n");
                  }
              }

              private void calculateResult() {
                  try {
                      String mathExpression = currentExpression.toString().replace("×", "*").replace("÷", "/");
                      if (mathExpression.isEmpty()) return;
                      expressionDisplay.setText(currentExpression.toString());
                      double result = eval(mathExpression);
                      String finalResult = (result == (long) result) ? String.format(Locale.US, "%d", (long) result) : String.format(Locale.US, "%s", result);
                      
                      lastResultMemory = finalResult;
                      historyList.add(currentExpression.toString() + " = " + finalResult);
                      
                      display.setText(finalResult);
                      currentExpression.setLength(0);
                      currentExpression.append(finalResult);
                      if (tts != null) tts.speak(finalResult, TextToSpeech.QUEUE_FLUSH, null, null);
                  } catch (Exception e) {
                      display.setText("Error");
                      currentExpression.setLength(0);
                  }
              }

              private double eval(final String str) {
                  return new Object() {
                      int pos = -1, ch;
                      void nextChar() { ch = (++pos < str.length()) ? str.charAt(pos) : -1; }
                      boolean eat(int charToEat) { while (ch == ' ') nextChar(); if (ch == charToEat) { nextChar(); return true; } return false; }
                      double parse() { nextChar(); double x = parseExpression(); return x; }
                      double parseExpression() { double x = parseTerm(); for (;;) { if (eat('+')) x += parseTerm(); else if (eat('-')) x -= parseTerm(); else return x; } }
                      double parseTerm() { double x = parseFactor(); for (;;) { if (eat('*')) x *= parseFactor(); else if (eat('/')) x /= parseFactor(); else return x; } }
                      double parseFactor() {
                          if (eat('+')) return parseFactor(); if (eat('-')) return -parseFactor();
                          double x; int startPos = this.pos;
                          if (eat('(')) { x = parseExpression(); eat(')'); }
                          else if ((ch >= '0' && ch <= '9') || ch == '.') { while ((ch >= '0' && ch <= '9') || ch == '.') nextChar(); x = Double.parseDouble(str.substring(startPos, this.pos)); } 
                          else { throw new RuntimeException("Unexpected"); }
                          if (eat('%')) x = x / 100; return x;
                      }
                  }.parse();
              }
              
              private void startVoiceInput() {
                  if (ContextCompat.checkSelfPermission(this, Manifest.permission.RECORD_AUDIO) != PackageManager.PERMISSION_GRANTED) {
                      ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.RECORD_AUDIO}, 1);
                  } else if (speechRecognizer != null) {
                      Intent intent = new Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH);
                      intent.putExtra(RecognizerIntent.EXTRA_LANGUAGE_MODEL, RecognizerIntent.LANGUAGE_MODEL_FREE_FORM);
                      intent.putExtra(RecognizerIntent.EXTRA_LANGUAGE, Locale.getDefault());
                      speechRecognizer.startListening(intent);
                  }
              }

              private void setupVoice() {
                  if (SpeechRecognizer.isRecognitionAvailable(this)) {
                      speechRecognizer = SpeechRecognizer.createSpeechRecognizer(this);
                      speechRecognizer.setRecognitionListener(new RecognitionListener() {
                          @Override public void onReadyForSpeech(Bundle params) {}
                          @Override public void onBeginningOfSpeech() { if(isChatOpen) chatInput.setHint("Sun raha hoon..."); }
                          @Override public void onRmsChanged(float rmsdB) {}
                          @Override public void onBufferReceived(byte[] buffer) {}
                          @Override public void onEndOfSpeech() { if(isChatOpen) chatInput.setHint("Type or speak math..."); }
                          @Override public void onError(int error) {}
                          @Override public void onResults(Bundle results) {
                              ArrayList<String> matches = results.getStringArrayList(SpeechRecognizer.RESULTS_RECOGNITION);
                              if (matches != null && !matches.isEmpty()) {
                                  if(isChatOpen) processNaturalLanguageAI(matches.get(0));
                                  else { chatInput.setText(matches.get(0)); processNaturalLanguageAI(matches.get(0)); isChatOpen = true; chatContainer.setVisibility(View.VISIBLE); calcContainer.setVisibility(View.GONE); }
                              }
                          }
                          @Override public void onPartialResults(Bundle partialResults) {}
                          @Override public void onEvent(int eventType, Bundle params) {}
                      });
                  }
              }

              private void showHistoryDialog() {
                  StringBuilder hist = new StringBuilder();
                  if(historyList.isEmpty()) hist.append("No History Yet");
                  for(String s : historyList) hist.append(s).append("\n\n");
                  new AlertDialog.Builder(this).setTitle("Calculation History").setMessage(hist.toString()).setPositiveButton("Close", null).setNegativeButton("Clear", (d, w) -> historyList.clear()).show();
              }
              
              private void hideKeyboard() {
                  View view = this.getCurrentFocus();
                  if (view != null) { InputMethodManager imm = (InputMethodManager)getSystemService(Context.INPUT_METHOD_SERVICE); imm.hideSoftInputFromWindow(view.getWindowToken(), 0); }
              }

              @Override
              protected void onDestroy() {
                  if (tts != null) { tts.stop(); tts.shutdown(); }
                  if (speechRecognizer != null) { speechRecognizer.destroy(); }
                  super.onDestroy();
              }
          }
