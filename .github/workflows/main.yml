name: Build Zeeshan Husain Smile Pro Calculator

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Stable Standard)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 1. Setup App Folders
        run: |
          mkdir -p app/src/main/java/com/zeeshan/calculator
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/res/mipmap-xhdpi

      - name: 2. Setup Root Files
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "ZeeshanCalc"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          plugins {
              id 'com.android.application' version '8.3.0' apply false
          }
          EOF

      - name: 3. Setup Gradle Properties (100% Crash Fix)
        run: |
          cat << 'EOF' > gradle.properties
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

      - name: 4. Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: 5. App Build Config
        run: |
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.zeeshan.calculator'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.zeeshan.calculator'
                  minSdk 26
                  targetSdk 34
                  versionCode 5
                  versionName "5.0-Premium-UI"
              }
              compileOptions { 
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17 
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

      - name: 6. Premium Colors & Themes (From Image)
        run: |
          cat << 'EOF' > app/src/main/res/values/colors.xml
          <resources>
              <color name="bg_dark">#2A3543</color>
              <color name="btn_num_bg">#344152</color>
              <color name="btn_top_bg">#DCE1E8</color>
              <color name="btn_op_bg">#F59514</color>
              <color name="text_white">#FFFFFF</color>
              <color name="text_dark">#2A3543</color>
              <color name="text_hint">#8A9AAB</color>
              <color name="mic_color">#E53935</color>
          </resources>
          EOF

          cat << 'EOF' > app/src/main/res/values/themes.xml
          <resources>
              <style name="Theme.ZeeshanCalc" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="android:windowBackground">@color/bg_dark</item>
                  <item name="android:statusBarColor">@color/bg_dark</item>
              </style>
          </resources>
          EOF

      - name: 7. Create Custom Button Shapes
        run: |
          cat << 'EOF' > app/src/main/res/drawable/bg_btn_num.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="@color/btn_num_bg"/>
              <stroke android:width="1dp" android:color="#415166"/>
          </shape>
          EOF
          
          cat << 'EOF' > app/src/main/res/drawable/bg_btn_top.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="@color/btn_top_bg"/>
          </shape>
          EOF
          
          cat << 'EOF' > app/src/main/res/drawable/bg_btn_op.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="@color/btn_op_bg"/>
          </shape>
          EOF
          
          cat << 'EOF' > app/src/main/res/drawable/bg_btn_zero.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="@color/btn_num_bg"/>
              <corners android:radius="40dp"/>
              <stroke android:width="1dp" android:color="#415166"/>
          </shape>
          EOF

      - name: 8. Create Premium UI Layout (Like Image)
        run: |
          cat << 'EOF' > app/src/main/res/layout/activity_main.xml
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="@color/bg_dark" android:padding="20dp">
              
              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal">
                  <androidx.appcompat.widget.AppCompatButton android:id="@+id/btn_mic"
                      android:layout_width="50dp" android:layout_height="50dp" android:background="@drawable/bg_btn_top"
                      android:text="MIC" android:textColor="@color/mic_color" android:textSize="12sp" android:textStyle="bold"/>
                  <Space android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1"/>
              </LinearLayout>

              <LinearLayout android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1" android:orientation="vertical" android:gravity="bottom|end" android:paddingBottom="20dp">
                  <TextView android:id="@+id/tv_expression" android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="" android:textColor="@color/text_hint" android:textSize="24sp" android:fontFamily="sans-serif-light"/>
                  <TextView android:id="@+id/tv_display" android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="0" android:textColor="@color/text_white" android:textSize="64sp" android:fontFamily="sans-serif-light"/>
              </LinearLayout>

              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical">
                  
                  <LinearLayout android:layout_width="match_parent" android:layout_height="75dp" android:orientation="horizontal" android:layout_marginBottom="12dp">
                      <androidx.appcompat.widget.AppCompatButton android:text="AC" android:textColor="@color/text_dark" android:background="@drawable/bg_btn_top" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="22sp"/>
                      <androidx.appcompat.widget.AppCompatButton android:text="+/-" android:textColor="@color/text_dark" android:background="@drawable/bg_btn_top" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="22sp"/>
                      <androidx.appcompat.widget.AppCompatButton android:text="DEL" android:textColor="@color/text_dark" android:background="@drawable/bg_btn_top" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="18sp"/>
                      <androidx.appcompat.widget.AppCompatButton android:text="÷" android:textColor="@color/text_white" android:background="@drawable/bg_btn_op" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:textSize="28sp"/>
                  </LinearLayout>

                  <LinearLayout android:layout_width="match_parent" android:layout_height="75dp" android:orientation="horizontal" android:layout_marginBottom="12dp">
                      <androidx.appcompat.widget.AppCompatButton android:text="7" android:textColor="@color/text_white" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                      <androidx.appcompat.widget.AppCompatButton android:text="8" android:textColor="@color/text_white" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                      <androidx.appcompat.widget.AppCompatButton android:text="9" android:textColor="@color/text_white" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                      <androidx.appcompat.widget.AppCompatButton android:text="×" android:textColor="@color/text_white" android:background="@drawable/bg_btn_op" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:textSize="28sp"/>
                  </LinearLayout>

                  <LinearLayout android:layout_width="match_parent" android:layout_height="75dp" android:orientation="horizontal" android:layout_marginBottom="12dp">
                      <androidx.appcompat.widget.AppCompatButton android:text="4" android:textColor="@color/text_white" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                      <androidx.appcompat.widget.AppCompatButton android:text="5" android:textColor="@color/text_white" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                      <androidx.appcompat.widget.AppCompatButton android:text="6" android:textColor="@color/text_white" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                      <androidx.appcompat.widget.AppCompatButton android:text="-" android:textColor="@color/text_white" android:background="@drawable/bg_btn_op" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:textSize="32sp"/>
                  </LinearLayout>

                  <LinearLayout android:layout_width="match_parent" android:layout_height="75dp" android:orientation="horizontal" android:layout_marginBottom="12dp">
                      <androidx.appcompat.widget.AppCompatButton android:text="1" android:textColor="@color/text_white" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                      <androidx.appcompat.widget.AppCompatButton android:text="2" android:textColor="@color/text_white" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                      <androidx.appcompat.widget.AppCompatButton android:text="3" android:textColor="@color/text_white" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                      <androidx.appcompat.widget.AppCompatButton android:text="+" android:textColor="@color/text_white" android:background="@drawable/bg_btn_op" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:textSize="28sp"/>
                  </LinearLayout>

                  <LinearLayout android:layout_width="match_parent" android:layout_height="75dp" android:orientation="horizontal">
                      <androidx.appcompat.widget.AppCompatButton android:text="0" android:textColor="@color/text_white" android:background="@drawable/bg_btn_zero" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="2" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                      <androidx.appcompat.widget.AppCompatButton android:text="." android:textColor="@color/text_white" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                      <androidx.appcompat.widget.AppCompatButton android:text="=" android:textColor="@color/text_white" android:background="@drawable/bg_btn_op" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:textSize="28sp"/>
                  </LinearLayout>
              </LinearLayout>
          </LinearLayout>
          EOF

      - name: 9. Write AndroidManifest
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.VIBRATE" />
              <queries><intent><action android:name="android.intent.action.TTS_SERVICE" /></intent></queries>
              <application android:label="ZH Pro Calc" android:theme="@style/Theme.ZeeshanCalc" android:icon="@mipmap/ic_launcher">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 10. Write Pro Math Engine & Logic
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/calculator/MainActivity.java
          package com.zeeshan.calculator;
          import android.Manifest;
          import android.content.Context;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.os.Bundle;
          import android.os.Vibrator;
          import android.speech.RecognitionListener;
          import android.speech.RecognizerIntent;
          import android.speech.SpeechRecognizer;
          import android.speech.tts.TextToSpeech;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.Button;
          import android.widget.TextView;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import java.util.ArrayList;
          import java.util.Locale;

          public class MainActivity extends AppCompatActivity {
              private TextToSpeech tts;
              private SpeechRecognizer speechRecognizer;
              private TextView display, expressionDisplay;
              private StringBuilder currentExpression = new StringBuilder();
              private Vibrator vibrator;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  display = findViewById(R.id.tv_display);
                  expressionDisplay = findViewById(R.id.tv_expression);
                  vibrator = (Vibrator) getSystemService(Context.VIBRATOR_SERVICE);

                  tts = new TextToSpeech(this, status -> {
                      if (status == TextToSpeech.SUCCESS) tts.setLanguage(new Locale("en", "IN"));
                  });

                  setupVoice();
                  setupButtons(findViewById(android.R.id.content));
              }
              
              private void setupButtons(View view) {
                  if (view instanceof ViewGroup) {
                      ViewGroup group = (ViewGroup) view;
                      for (int i = 0; i < group.getChildCount(); i++) {
                          setupButtons(group.getChildAt(i));
                      }
                  } else if (view instanceof Button) {
                      view.setOnClickListener(v -> onButtonClick((Button) v));
                  }
              }

              private void onButtonClick(Button button) {
                  if (vibrator != null && vibrator.hasVibrator()) { vibrator.vibrate(30); }
                  
                  String btnText = button.getText().toString();
                  if (btnText.equals("AC")) {
                      currentExpression.setLength(0);
                      display.setText("0");
                      expressionDisplay.setText("");
                  } else if (btnText.equals("DEL")) {
                      if (currentExpression.length() > 0) {
                          currentExpression.deleteCharAt(currentExpression.length() - 1);
                          display.setText(currentExpression.length() == 0 ? "0" : currentExpression.toString());
                      }
                  } else if (btnText.equals("MIC")) {
                      startVoiceInput();
                  } else if (btnText.equals("+/-")) {
                      if (currentExpression.length() > 0 && !display.getText().toString().equals("Error")) {
                          if (currentExpression.charAt(0) == '-') currentExpression.deleteCharAt(0);
                          else currentExpression.insert(0, "-");
                          display.setText(currentExpression.toString());
                      }
                  } else if (btnText.equals("=")) {
                      calculateResult();
                  } else {
                      if (display.getText().toString().equals("0") || display.getText().toString().equals("Error")) {
                          if (!btnText.equals("÷") && !btnText.equals("×") && !btnText.equals("+") && !btnText.equals("-") && !btnText.equals(".")) {
                              currentExpression.setLength(0);
                          }
                      }
                      currentExpression.append(btnText);
                      display.setText(currentExpression.toString());
                  }
              }

              private void startVoiceInput() {
                  if (ContextCompat.checkSelfPermission(this, Manifest.permission.RECORD_AUDIO) != PackageManager.PERMISSION_GRANTED) {
                      ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.RECORD_AUDIO}, 1);
                  } else if (speechRecognizer != null) {
                      Intent intent = new Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH);
                      intent.putExtra(RecognizerIntent.EXTRA_LANGUAGE_MODEL, RecognizerIntent.LANGUAGE_MODEL_FREE_FORM);
                      intent.putExtra(RecognizerIntent.EXTRA_LANGUAGE, Locale.getDefault());
                      speechRecognizer.startListening(intent);
                  }
              }

              private void processVoiceCommand(String text) {
                  text = text.replace("plus", "+").replace("minus", "-")
                             .replace("multiply", "×").replace("divided by", "÷")
                             .replace("divide", "÷").replace("into", "×")
                             .replace("x", "×").replaceAll("[^0-9+\\-÷×().]", "");
                  currentExpression.setLength(0);
                  currentExpression.append(text);
                  display.setText(currentExpression.toString());
                  calculateResult();
              }

              private void calculateResult() {
                  try {
                      String mathExpression = currentExpression.toString().replace("×", "*").replace("÷", "/");
                      if (mathExpression.isEmpty()) return;
                      
                      expressionDisplay.setText(currentExpression.toString());
                      double result = eval(mathExpression);
                      String finalResult = (result == (long) result) ? String.format(Locale.US, "%d", (long) result) : String.format(Locale.US, "%s", result);
                      
                      display.setText(finalResult);
                      currentExpression.setLength(0);
                      currentExpression.append(finalResult);

                      if (tts != null) { tts.speak(finalResult, TextToSpeech.QUEUE_FLUSH, null, null); }
                  } catch (Exception e) {
                      display.setText("Error");
                      currentExpression.setLength(0);
                  }
              }

              private double eval(final String str) {
                  return new Object() {
                      int pos = -1, ch;
                      void nextChar() { ch = (++pos < str.length()) ? str.charAt(pos) : -1; }
                      boolean eat(int charToEat) {
                          while (ch == ' ') nextChar();
                          if (ch == charToEat) { nextChar(); return true; }
                          return false;
                      }
                      double parse() { nextChar(); double x = parseExpression(); return x; }
                      double parseExpression() {
                          double x = parseTerm();
                          for (;;) { if (eat('+')) x += parseTerm(); else if (eat('-')) x -= parseTerm(); else return x; }
                      }
                      double parseTerm() {
                          double x = parseFactor();
                          for (;;) { if (eat('*')) x *= parseFactor(); else if (eat('/')) x /= parseFactor(); else return x; }
                      }
                      double parseFactor() {
                          if (eat('+')) return parseFactor(); if (eat('-')) return -parseFactor();
                          double x;
                          int startPos = this.pos;
                          if (eat('(')) { x = parseExpression(); eat(')'); }
                          else if ((ch >= '0' && ch <= '9') || ch == '.') { 
                              while ((ch >= '0' && ch <= '9') || ch == '.') nextChar(); 
                              x = Double.parseDouble(str.substring(startPos, this.pos)); 
                          } else { throw new RuntimeException("Unexpected: " + (char)ch); }
                          return x;
                      }
                  }.parse();
              }
              
              private void setupVoice() {
                  if (SpeechRecognizer.isRecognitionAvailable(this)) {
                      speechRecognizer = SpeechRecognizer.createSpeechRecognizer(this);
                      speechRecognizer.setRecognitionListener(new RecognitionListener() {
                          @Override public void onReadyForSpeech(Bundle params) {}
                          @Override public void onBeginningOfSpeech() { expressionDisplay.setText("Listening..."); }
                          @Override public void onRmsChanged(float rmsdB) {}
                          @Override public void onBufferReceived(byte[] buffer) {}
                          @Override public void onEndOfSpeech() {}
                          @Override public void onError(int error) { expressionDisplay.setText(""); }
                          @Override public void onResults(Bundle results) {
                              ArrayList<String> matches = results.getStringArrayList(SpeechRecognizer.RESULTS_RECOGNITION);
                              if (matches != null && !matches.isEmpty()) {
                                  processVoiceCommand(matches.get(0).toLowerCase());
                              }
                          }
                          @Override public void onPartialResults(Bundle partialResults) {}
                          @Override public void onEvent(int eventType, Bundle params) {}
                      });
                  }
              }

              @Override
              protected void onDestroy() {
                  if (tts != null) { tts.stop(); tts.shutdown(); }
                  if (speechRecognizer != null) { speechRecognizer.destroy(); }
                  super.onDestroy();
              }
          }
          EOF

      - name: 11. Create Mipmap Fallbacks
        run: |
          cat << 'EOF' > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#2A3543" android:pathData="M0,0h108v108h-108z"/>
          </vector>
          EOF
          cp app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          cp app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml app/src/main/res/mipmap-xhdpi/ic_launcher.xml
          cp app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml app/src/main/res/mipmap-xhdpi/ic_launcher_round.xml

      - name: 12. Build Final APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --info

      - name: 13. Upload Final Premium APK
        uses: actions/upload-artifact@v4
        with:
          name: Zeeshan-Premium-Calc
          path: app/build/outputs/apk/debug/app-debug.apk
